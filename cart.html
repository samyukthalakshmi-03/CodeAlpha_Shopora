<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - Shopora</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h2 onclick="window.location.href='/'">Shopora</h2>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/cart.html">Cart <span id="cartCount"></span></a>
      <a href="/login.html">Login</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="container">
    <div class="cart-container">
      <h2 style="margin-bottom: 2rem; font-size: 2rem; color: #fff;">Your Shopping Cart</h2>
      
      <div id="cart">
        <p style="text-align:center; color: #94a3b8;">Loading cart...</p>
      </div>
      
      <div class="cart-total" id="cart-total" style="display:none;">
        <p>Total: <span id="totalPrice">₹0</span></p>
        <button onclick="placeOrder()" class="btn-primary" style="margin-top: 1rem;">Process Checkout</button>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Shopora | Crafted with Precision</p>
  </footer>

  <script src="script.js?v=2"></script>
</body>
</html>
